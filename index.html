<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 AX 가속화 워크숍 · 수상 상품 확인</title>
<style>
  :root{
    --ink:#0b1120; --ink-2:#111a2e; --text:#eef2fb; --muted:#9aa7c4;
    /* 기본(우수상=골드) — body 클래스로 등급별 override */
    --metal-1:#f6e2a8; --metal-2:#d8b45a; --metal-3:#a9822f;
    --glow:rgba(216,180,90,.35); --line:rgba(216,180,90,.28);
  }
  body.silver{
    --metal-1:#f2f5f9; --metal-2:#c3ccd6; --metal-3:#8b96a3;
    --glow:rgba(200,212,228,.32); --line:rgba(200,212,228,.28);
  }
  body.bronze{
    --metal-1:#f4cfa6; --metal-2:#c67f45; --metal-3:#8a4f28;
    --glow:rgba(198,127,69,.34); --line:rgba(198,127,69,.30);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    min-height:100dvh;
    background:
      radial-gradient(1200px 700px at 50% -10%, var(--glow), transparent 60%),
      radial-gradient(900px 600px at 50% 120%, rgba(80,110,190,.18), transparent 60%),
      linear-gradient(180deg, var(--ink), var(--ink-2));
    color:var(--text);
    font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    display:grid; place-items:center; padding:32px 20px;
    -webkit-font-smoothing:antialiased;
  }
  .card{width:min(440px,100%);text-align:center;display:flex;flex-direction:column;align-items:center;}
  .eyebrow{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:22px;}
  .medal{
    position:relative;width:132px;height:132px;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(from 210deg, var(--metal-3), var(--metal-1) 25%, var(--metal-2) 50%, var(--metal-1) 72%, var(--metal-3));
    box-shadow:0 0 0 6px rgba(255,255,255,.04), 0 14px 40px -12px var(--glow);margin-bottom:26px;
  }
  .medal::after{
    content:"";position:absolute;inset:11px;border-radius:50%;
    background:radial-gradient(120% 120% at 30% 25%, #1b2a4a, #0f1a30 72%);
    border:1px solid rgba(255,255,255,.06);
  }
  .medal .grade{
    position:relative;z-index:1;font-size:34px;font-weight:800;letter-spacing:.02em;line-height:1;
    background:linear-gradient(180deg,var(--metal-1),var(--metal-2));-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  h1{font-size:17px;font-weight:600;color:var(--muted);margin:0 0 6px;}
  .lead{font-size:22px;font-weight:700;margin:0 0 26px;text-wrap:balance;line-height:1.45;}
  .stage{width:100%;min-height:190px;display:grid;place-items:center;}
  .reveal-btn{
    appearance:none;border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(216,180,90,.16), rgba(216,180,90,.06));
    color:var(--metal-1);font:inherit;font-weight:700;font-size:16px;padding:18px 30px;border-radius:999px;cursor:pointer;
    display:inline-flex;align-items:center;gap:10px;transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
    box-shadow:0 10px 30px -14px var(--glow);
  }
  .reveal-btn:hover{transform:translateY(-2px);}
  .reveal-btn:focus-visible{outline:2px solid var(--metal-1);outline-offset:3px;}
  .reveal-btn .gift{font-size:20px;}
  .hint{font-size:14px;color:var(--muted);margin-top:14px;}
  .prize{display:none;flex-direction:column;align-items:center;gap:10px;animation:pop .55s cubic-bezier(.2,.9,.25,1.2) both;}
  .prize.show{display:flex;}
  .prize .congrats{font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:var(--metal-2);font-weight:700;}
  .prize .amount{
    font-size:44px;font-weight:800;line-height:1.05;letter-spacing:-.01em;
    background:linear-gradient(180deg,#fff,var(--metal-1));-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .prize .item{font-size:17px;color:var(--text);font-weight:600;padding:8px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.03);}
  .foot{margin-top:32px;font-size:13px;color:var(--muted);line-height:1.7;border-top:1px solid rgba(255,255,255,.07);padding-top:18px;width:100%;}
  .foot .org{color:#c3ccdf;font-weight:600;}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:5;}
  @keyframes pop{from{opacity:0;transform:scale(.8) translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.prize{animation:none}.reveal-btn{transition:none}}
</style>

<canvas id="confetti" aria-hidden="true"></canvas>

<main class="card">
  <div class="eyebrow">2026 AX 가속화 워크숍</div>
  <div class="medal"><span class="grade" id="grade">우수상</span></div>
  <h1>한국기계연구원 바이오기계연구실</h1>
  <p class="lead" id="lead">수상을 진심으로 축하드립니다</p>

  <div class="stage">
    <div id="wrap">
      <button class="reveal-btn" id="revealBtn"><span class="gift">🎁</span> 상품 확인하기</button>
      <div class="hint">버튼을 눌러 상품을 확인하세요</div>
    </div>
    <div class="prize" id="prize">
      <div class="congrats" id="congrats">Congratulations</div>
      <div class="amount" id="amount">매점이용권 3만원</div>
      <div class="item" id="item">우수상 · 상품 수령을 축하합니다</div>
    </div>
  </div>

  <div class="foot">
    <span class="org">한국기계연구원 바이오기계연구실</span><br>
    2026 AX 가속화 워크숍 시상
  </div>
</main>

<script>
  (function(){
    var DATA={
      woosu:   {cls:'gold',   grade:'우수상', amount:'매점이용권 3만원', lead:'수상을 진심으로 축하드립니다', congrats:'Congratulations', item:'우수상 · 상품 수령을 축하합니다'},
      jangryeo:{cls:'silver', grade:'장려상', amount:'매점이용권 2만원', lead:'수상을 진심으로 축하드립니다', congrats:'Congratulations', item:'장려상 · 상품 수령을 축하합니다'},
      chamga:  {cls:'bronze', grade:'참가상', amount:'매점이용권 1만원', lead:'함께해 주셔서 감사합니다',   congrats:'Thank You',      item:'참가상 · 참여해 주셔서 감사합니다'}
    };
    var q=new URLSearchParams(location.search).get('g');
    var d=DATA[q]||DATA.woosu;
    document.body.className=d.cls;
    document.getElementById('grade').textContent=d.grade;
    document.getElementById('lead').textContent=d.lead;
    document.getElementById('amount').textContent=d.amount;
    document.getElementById('congrats').textContent=d.congrats;
    document.getElementById('item').textContent=d.item;
    document.title='2026 AX 가속화 워크숍 · '+d.grade;

    var btn=document.getElementById('revealBtn'),wrap=document.getElementById('wrap'),prize=document.getElementById('prize');
    var reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    btn.addEventListener('click',function(){wrap.style.display='none';prize.classList.add('show');if(!reduce)burst();});

    var cv=document.getElementById('confetti'),ctx=cv.getContext('2d'),W,H,parts=[],raf=null;
    function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
    size();addEventListener('resize',size);
    var colors=['#f6e2a8','#d8b45a','#ffffff','#c3ccd6','#8fb3ff'];
    function burst(){
      parts=[];
      for(var i=0;i<130;i++){
        parts.push({x:W/2,y:H*0.42,vx:(Math.cos(i)*1.7)+(i%7-3)*1.3,vy:-(6+(i%9)),g:0.22+(i%5)*0.02,s:5+(i%6),c:colors[i%colors.length],rot:i,vr:(i%2?1:-1)*0.2,a:1});
      }
      if(raf)cancelAnimationFrame(raf);tick();
    }
    function tick(){
      ctx.clearRect(0,0,W,H);var alive=false;
      for(var i=0;i<parts.length;i++){
        var p=parts[i];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
        if(p.y>H*0.72)p.a-=0.02;if(p.a<=0)continue;alive=true;
        ctx.save();ctx.globalAlpha=Math.max(p.a,0);ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);ctx.restore();
      }
      if(alive)raf=requestAnimationFrame(tick);else ctx.clearRect(0,0,W,H);
    }
  })();
</script>
